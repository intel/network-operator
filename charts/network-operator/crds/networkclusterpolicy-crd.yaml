---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: networkclusterpolicies.intel.com
spec:
  group: intel.com
  names:
    kind: NetworkClusterPolicy
    listKind: NetworkClusterPolicyList
    plural: networkclusterpolicies
    singular: networkclusterpolicy
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NetworkClusterPolicy is the Schema for the networkclusterpolicies
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NetworkClusterPolicySpec defines the desired state of NetworkClusterPolicy
            properties:
              configurationType:
                description: 'Configuration type that the operator will configure
                  to the nodes. Possible options: gaudi-so, hostnic-so.'
                enum:
                - gaudi-so
                - hostnic-so
                type: string
              gaudiScaleOut:
                description: Gaudi Scale-Out specific settings. Only valid when configuration
                  type is 'gaudi-so'
                properties:
                  disableNetworkManager:
                    description: |-
                      Disable Gaudi scale-out interfaces in NetworkManager. For nodes where NetworkManager tries
                      to configure the Gaudi interfaces, prevent it from doing so.
                    type: boolean
                  enableLLDPAD:
                    description: |-
                      Enable LLDP for Priority Flow Control in a dedicated container
                      Keep this value as false if lldpad LLDP daemon is already present and
                      running on the host
                    type: boolean
                  image:
                    description: Container image to handle interface configurations
                      on the worker nodes.
                    type: string
                  layer:
                    description: 'Layer where the configuration should occur. Possible
                      options: L2 and L3.'
                    enum:
                    - L2
                    - L3
                    type: string
                  mtu:
                    description: MTU for the scale-out interfaces.
                    maximum: 9000
                    minimum: 1500
                    type: integer
                  networkMetrics:
                    description: Enable scale-out network metrics support.
                    type: boolean
                  pfcPriorities:
                    description: |-
                      Bitmask of Priority Flow Control priorities to enable
                      Requires lldpad on the host, or enabling the above EnableLLDPAD boolean
                      Currently accepted values are 00000000 or 11110000
                    enum:
                    - "00000000"
                    - "11110000"
                    type: string
                  pullPolicy:
                    description: Normal image pull policy used in the resulting daemonset.
                    enum:
                    - Never
                    - Always
                    - IfNotPresent
                    type: string
                type: object
              hostNicScaleOut:
                description: Host NIC Scale-Out specific settings, valid when configuration
                  type is 'hostnic-so'
                properties:
                  dranet:
                    description: Dranet specification,  not used if installDranet
                      is false
                    properties:
                      image:
                        description: Dranet image to use.
                        type: string
                      pullPolicy:
                        description: Pull policy for the dranet image.
                        enum:
                        - Never
                        - Always
                        - IfNotPresent
                        type: string
                      rdmaDeviceClass:
                        description: Device Class for DRANet RDMA resources
                        properties:
                          name:
                            description: Name of the RDMA device class
                            type: string
                        required:
                        - name
                        type: object
                    type: object
                  installDranet:
                    description: |-
                      Have the Network Operator install DRANet into its namespace. If set
                      to false, the cluster admin is expected to provision DRANet by other
                      means.
                    type: boolean
                required:
                - installDranet
                type: object
              logLevel:
                description: LogLevel sets the operator's log level.
                maximum: 8
                minimum: 0
                type: integer
              nodeSelector:
                additionalProperties:
                  type: string
                description: Select which nodes the operator should target. Align
                  with labels created by NFD.
                type: object
            required:
            - configurationType
            type: object
            x-kubernetes-validations:
            - message: nodeSelector is required when configurationType is gaudi-so
              rule: self.configurationType != 'gaudi-so' || has(self.nodeSelector)
          status:
            description: NetworkClusterPolicyStatus defines the observed state of
              NetworkClusterPolicy
            properties:
              errors:
                items:
                  type: string
                type: array
              ready:
                format: int32
                type: integer
              state:
                type: string
              targets:
                format: int32
                type: integer
            required:
            - errors
            - ready
            - state
            - targets
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
