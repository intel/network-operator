logLevel: 2

operator:
  image:
    repository: intel/intel-network-operator
    tag: 1.2.0@sha256:059dc0304b2b7bcfc110e10d6691af36e3e9ac58a04494d5fa3cd874bf5e0867
    imagePullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

nfd:
  install: false
  gaudiRule: true

config:
  gaudi:
    enabled: false
    mode: "L3"
    mtu: 8000
    networkManager:
      disable: false
    pfc:
      config: "11110000"
      lldpad: false
    networkMetrics: false
    image:
      repository: intel/intel-network-linkdiscovery
      tag: 1.2.0@sha256:cee31b7a9f5f488ed1db7dabe74fe5c232ee766e0db42d2b36b6d9f2a19bd06b
      imagePullPolicy: IfNotPresent
    nodeSelector:
      intel.feature.node.kubernetes.io/gaudi-ready: "true"
  hostnic:
    enabled: false
    dranet:
      install: false
      image: registry.k8s.io/networking/dranet:v1.2.0
      imagePullPolicy: IfNotPresent
      rdmaDeviceClass:
        name: dranet-rdma

prometheus:
  labels:
    # replace with the label your Prometheus' selector is configured with:
    #   release: prometheus
    #   release: monitoring
    # or similar
    release: prom
