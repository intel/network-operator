
{{- if or .Values.config.gaudi.enabled .Values.config.hostnic.enabled }}
{{- if and .Values.config.gaudi.enabled .Values.config.hostnic.enabled }}
{{- fail "Either gaudi or hostnic can be enabled, but not both" }}
{{- end }}
{{- if .Values.config.gaudi.enabled }}
{{- $valid := list "L2" "L3" }}
{{- if not (has .Values.config.gaudi.mode $valid) }}
{{- fail "Invalid layer mode" }}
{{- end }}
{{- if or (lt (int .Values.config.gaudi.mtu) 1500) (gt (int .Values.config.gaudi.mtu) 9000) }}
{{- fail "MTU must be between 1500 and 9000" }}
{{- end }}
{{- end}}
apiVersion: intel.com/v1alpha1
kind: NetworkClusterPolicy
{{- if .Values.config.gaudi.enabled }}
metadata:
  name: netconf-gaudi-scale-out
spec:
  configurationType: gaudi-so
  gaudiScaleOut:
    layer: {{ .Values.config.gaudi.mode }}
    image: "{{ .Values.config.gaudi.image.repository }}:{{ .Values.config.gaudi.image.tag }}"
    pullPolicy: {{ .Values.config.gaudi.image.imagePullPolicy }}
    mtu: {{ .Values.config.gaudi.mtu }}
{{- if .Values.config.gaudi.networkManager }}
    disableNetworkManager: {{ .Values.config.gaudi.networkManager.disable }}
{{- end -}}
{{- if .Values.config.gaudi.pfc }}
    pfcPriorities: {{ .Values.config.gaudi.pfc.config | quote }}
    enableLLDPAD: {{ .Values.config.gaudi.pfc.lldpad }}
{{- end }}
    networkMetrics: {{ .Values.config.gaudi.networkMetrics }}

  logLevel: {{ .Values.logLevel }}
  nodeSelector: {{- .Values.config.gaudi.nodeSelector | toYaml | nindent 4 }}
{{- end }}
{{- if .Values.config.hostnic.enabled }}
metadata:
  name: netconf-hostnic-scale-out
spec:
  configurationType: hostnic-so
  hostNicScaleOut:
    installDranet: {{ .Values.config.hostnic.dranet.install }}
{{- if .Values.config.hostnic.dranet.image }}
    dranet:
      image: {{ .Values.config.hostnic.dranet.image }}
{{- if .Values.config.hostnic.dranet.imagePullPolicy }}
      pullPolicy: {{ .Values.config.hostnic.dranet.imagePullPolicy }}
{{- end }}
{{- end }}

{{- end }}
{{- end }}
